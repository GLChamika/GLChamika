name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: Platane/snk@v3
        with:
          github_user_name: GLChamika
          outputs: dist/snake.svg
          snake_color: "#E4A700"        # Snake color (white)
          grid_color: "#848384"         # Grid color (dark gray)
          background_color: "#00000000" # Transparent background
      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
