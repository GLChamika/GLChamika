name: Daily README Update

on:
  schedule:
    - cron: "0 6 * * *" # runs daily at 6 AM UTC
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pick sequential SRE tip
        run: |
          # Create a counter file if it doesn't exist
          if [ ! -f counter.txt ]; then
            echo 1 > counter.txt
          fi

          # Read current counter
          COUNTER=$(cat counter.txt)

          # Get total number of tips
          TOTAL=$(wc -l < tips.txt)

          # Pick the tip at line COUNTER
          TIP=$(sed -n "${COUNTER}p" tips.txt)
          echo "$TIP" > tip.txt

          # Increment counter (wrap around if exceeds TOTAL)
          NEXT=$((COUNTER + 1))
          if [ $NEXT -gt $TOTAL ]; then
            NEXT=1
          fi
          echo $NEXT > counter.txt

      - name: Update README
        run: |
          TIP=$(cat tip.txt)
          sed -i "s|<!--QUOTE-->.*<!--ENDQUOTE-->|<!--QUOTE--> $TIP <!--ENDQUOTE-->|" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md counter.txt
          git commit -m "Daily README update with new SRE tip"
          git push
