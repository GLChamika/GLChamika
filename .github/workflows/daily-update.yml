name: Daily README Update

on:
  schedule:
    - cron: "0 6 * * *" # runs daily at 6 AM UTC
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch random quote
        run: |
          curl -s https://api.quotable.io/random > quote.json
          cat quote.json | jq -r '.content + " — " + .author' > quote.txt

      - name: Update README
        run: |
          QUOTE=$(cat quote.txt)
          sed -i "s|<!--QUOTE-->.*<!--ENDQUOTE-->|<!--QUOTE--> $QUOTE <!--ENDQUOTE-->|" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Daily README update with new quote"
          git push
