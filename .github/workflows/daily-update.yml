name: Daily README Update

on:
  schedule:
    - cron: "0 6 * * *" # runs daily at 6 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch random quote
        run: |
          QUOTE=$(curl -s https://api.quotable.io/random | grep -o '"content":"[^"]*"' | cut -d':' -f2 | tr -d '"')
          AUTHOR=$(curl -s https://api.quotable.io/random | grep -o '"author":"[^"]*"' | cut -d':' -f2 | tr -d '"')
          echo "$QUOTE — $AUTHOR" > quote.txt

      - name: Update README
        run: |
          QUOTE=$(cat quote.txt)
          sed -i "s|<!--QUOTE-->.*<!--ENDQUOTE-->|<!--QUOTE--> $QUOTE <!--ENDQUOTE-->|" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Daily README update with new quote"
          git push
